name: CI/CD Pipeline\n\non:\n  push:\n    branches: [main, develop]\n  pull_request:\n    branches: [main, develop]\n\njobs:\n  # ========================================\n  # LINT & FORMAT\n  # ========================================\n  lint:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v3\n      - uses: pnpm/action-setup@v2\n        with:\n          version: 10\n      - uses: actions/setup-node@v3\n        with:\n          node-version: \"22\"\n          cache: \"pnpm\"\n\n      - name: Install dependencies\n        run: pnpm install --frozen-lockfile\n\n      - name: Run linter\n        run: pnpm run lint || true\n\n      - name: Check formatting\n        run: pnpm run format:check || true\n\n  # ========================================\n  # TYPE CHECKING\n  # ========================================\n  typecheck:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v3\n      - uses: pnpm/action-setup@v2\n        with:\n          version: 10\n      - uses: actions/setup-node@v3\n        with:\n          node-version: \"22\"\n          cache: \"pnpm\"\n\n      - name: Install dependencies\n        run: pnpm install --frozen-lockfile\n\n      - name: Type check\n        run: pnpm run check\n\n  # ========================================\n  # UNIT TESTS\n  # ========================================\n  test:\n    runs-on: ubuntu-latest\n    services:\n      mysql:\n        image: mysql:8.0\n        env:\n          MYSQL_ROOT_PASSWORD: root\n          MYSQL_DATABASE: celebra_test\n        options: >-\n          --health-cmd=\"mysqladmin ping\"\n          --health-interval=10s\n          --health-timeout=5s\n          --health-retries=3\n        ports:\n          - 3306:3306\n\n    steps:\n      - uses: actions/checkout@v3\n      - uses: pnpm/action-setup@v2\n        with:\n          version: 10\n      - uses: actions/setup-node@v3\n        with:\n          node-version: \"22\"\n          cache: \"pnpm\"\n\n      - name: Install dependencies\n        run: pnpm install --frozen-lockfile\n\n      - name: Run tests\n        run: pnpm run test\n        env:\n          DATABASE_URL: mysql://root:root@localhost:3306/celebra_test\n          NODE_ENV: test\n\n      - name: Upload coverage\n        uses: codecov/codecov-action@v3\n        with:\n          files: ./coverage/coverage-final.json\n          flags: unittests\n          name: codecov-umbrella\n\n  # ========================================\n  # BUILD\n  # ========================================\n  build:\n    runs-on: ubuntu-latest\n    needs: [lint, typecheck, test]\n    steps:\n      - uses: actions/checkout@v3\n      - uses: pnpm/action-setup@v2\n        with:\n          version: 10\n      - uses: actions/setup-node@v3\n        with:\n          node-version: \"22\"\n          cache: \"pnpm\"\n\n      - name: Install dependencies\n        run: pnpm install --frozen-lockfile\n\n      - name: Build\n        run: pnpm run build\n        env:\n          NODE_ENV: production\n\n      - name: Upload build artifacts\n        uses: actions/upload-artifact@v3\n        with:\n          name: build\n          path: |\n            dist/\n            client/dist/\n\n  # ========================================\n  # SECURITY SCAN\n  # ========================================\n  security:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v3\n      - uses: pnpm/action-setup@v2\n        with:\n          version: 10\n      - uses: actions/setup-node@v3\n        with:\n          node-version: \"22\"\n          cache: \"pnpm\"\n\n      - name: Install dependencies\n        run: pnpm install --frozen-lockfile\n\n      - name: Run security audit\n        run: pnpm audit --audit-level=moderate || true\n\n      - name: Run SNYK scan\n        uses: snyk/actions/node@master\n        env:\n          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}\n        with:\n          args: --severity-threshold=high\n        continue-on-error: true\n\n  # ========================================\n  # E2E TESTS\n  # ========================================\n  e2e:\n    runs-on: ubuntu-latest\n    needs: build\n    steps:\n      - uses: actions/checkout@v3\n      - uses: pnpm/action-setup@v2\n        with:\n          version: 10\n      - uses: actions/setup-node@v3\n        with:\n          node-version: \"22\"\n          cache: \"pnpm\"\n\n      - name: Install dependencies\n        run: pnpm install --frozen-lockfile\n\n      - name: Download build artifacts\n        uses: actions/download-artifact@v3\n        with:\n          name: build\n\n      - name: Run E2E tests\n        run: pnpm run test:e2e || true\n        env:\n          NODE_ENV: test\n\n  # ========================================\n  # DEPLOY TO STAGING\n  # ========================================\n  deploy-staging:\n    runs-on: ubuntu-latest\n    needs: [build, security, e2e]\n    if: github.ref == 'refs/heads/develop'\n    steps:\n      - uses: actions/checkout@v3\n      - uses: pnpm/action-setup@v2\n        with:\n          version: 10\n      - uses: actions/setup-node@v3\n        with:\n          node-version: \"22\"\n          cache: \"pnpm\"\n\n      - name: Download build artifacts\n        uses: actions/download-artifact@v3\n        with:\n          name: build\n\n      - name: Deploy to staging\n        run: |\n          echo \"Deploying to staging environment...\"\n          # Add your staging deployment commands here\n        env:\n          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}\n          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}\n\n  # ========================================\n  # DEPLOY TO PRODUCTION\n  # ========================================\n  deploy-production:\n    runs-on: ubuntu-latest\n    needs: [build, security, e2e]\n    if: github.ref == 'refs/heads/main'\n    environment:\n      name: production\n    steps:\n      - uses: actions/checkout@v3\n      - uses: pnpm/action-setup@v2\n        with:\n          version: 10\n      - uses: actions/setup-node@v3\n        with:\n          node-version: \"22\"\n          cache: \"pnpm\"\n\n      - name: Download build artifacts\n        uses: actions/download-artifact@v3\n        with:\n          name: build\n\n      - name: Deploy to production\n        run: |\n          echo \"Deploying to production environment...\"\n          # Add your production deployment commands here\n        env:\n          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}\n          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}\n\n      - name: Create deployment\n        uses: actions/github-script@v6\n        with:\n          script: |\n            github.rest.repos.createDeployment({\n              owner: context.repo.owner,\n              repo: context.repo.repo,\n              ref: context.ref,\n              environment: 'production',\n              required_contexts: [],\n              auto_merge: false,\n            });\n\n      - name: Notify Slack\n        uses: 8398a7/action-slack@v3\n        with:\n          status: ${{ job.status }}\n          text: \"CELEBRA V4 deployed to production\"\n          webhook_url: ${{ secrets.SLACK_WEBHOOK }}\n        if: always()\n"
